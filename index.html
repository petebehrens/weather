<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a1929">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Weather">
<title>Weather</title>
<style>
:root {
  --fg: rgba(255,255,255,0.96);
  --muted: rgba(255,255,255,0.65);
  --line: rgba(255,255,255,0.16);
  --chip: rgba(255,255,255,0.14);
  --chip-active: rgba(255,255,255,0.92);
  --chip-active-fg: #0a1929;
  --rain: #BFE0FF;
  --warn: #fca5a5;
  --shadow: 0 1px 3px rgba(0,0,0,0.45);
  --rain-shadow: 0 1px 3px rgba(0,0,0,0.7);

  /* Tunable sizes — adjust via gear icon */
  --temp-size: 100px;
  --cond-icon-size: 54px;
  --hilo-size: 18px;
  --meta-size: 20px;
  --h-time-size: 16px;
  --h-temp-size: 22px;
  --h-icon-size: 32px;
  --h-arrow-size: 26px;
  --h-wind-text-size: 14px;
  --h-precip-size: 14px;
  --h-gap: 3px;
  --d-day-size: 18px;
  --d-icon-size: 28px;
  --d-range-size: 18px;
  --d-wind-size: 16px;
  --d-arrow-size: 20px;
  --d-precip-size: 15px;
  --d-row-padding: 11px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  color: var(--fg);
  text-shadow: var(--shadow);
}

html, body { height: 100%; }

body {
  position: relative;
  min-height: 100%;
  background: linear-gradient(180deg, #1a2a3e 0%, #2d4a6e 100%);
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  transition: background-image 0.5s ease;
}

body::before {
  content: "";
  position: fixed; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.40) 100%);
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 540px;
  margin: 0 auto;
  padding: max(14px, env(safe-area-inset-top)) 18px max(20px, env(safe-area-inset-bottom));
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  gap: 8px;
}

.location-picker {
  display: flex;
  gap: 2px;
  background: var(--chip);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 999px;
  padding: 3px;
  flex: 0 1 auto;
}

.location-picker button {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 999px;
  cursor: pointer;
  font-family: inherit;
  text-shadow: var(--shadow);
  white-space: nowrap;
}

.location-picker button.active {
  background: var(--chip-active);
  color: var(--chip-active-fg);
  text-shadow: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.18);
}

.header-buttons { display: flex; gap: 4px; flex-shrink: 0; }

.icon-btn {
  background: transparent;
  border: none;
  color: var(--fg);
  font-size: 18px;
  cursor: pointer;
  font-family: inherit;
  padding: 4px 8px;
  line-height: 1;
  opacity: 0.75;
}
.icon-btn:hover { opacity: 1; }
.refresh.spinning { animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 480px) {
  .config-btn { display: none; }
}

/* Location label */
.location-label {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.4px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

/* Current */
.current { margin-bottom: 22px; }

.current-grid {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.current-left { min-width: 0; display: inline-flex; flex-direction: column; align-items: center; }
.temp-line { display: flex; align-items: center; gap: 14px; }

.current .temp {
  font-size: var(--temp-size);
  font-weight: 200;
  letter-spacing: -4px;
  line-height: 0.95;
  font-feature-settings: "tnum";
}

.current .cond-icon {
  font-size: var(--cond-icon-size);
  line-height: 1;
  display: inline-flex;
  align-items: center;
}

.current .hilo {
  font-size: var(--hilo-size);
  color: var(--muted);
  margin-top: 8px;
  font-feature-settings: "tnum";
  text-align: center;
  width: 100%;
}
.current .hilo .hi { color: var(--fg); font-weight: 500; }

.current-right {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  text-align: right;
}

.current-right .meta-line {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  font-size: var(--meta-size);
  font-feature-settings: "tnum";
  font-weight: 500;
}

.current-right .meta-line .wind-arrow {
  width: calc(var(--meta-size) * 1.4);
  height: calc(var(--meta-size) * 0.77);
}

.current-right .meta-line.precip { color: var(--rain); text-shadow: var(--rain-shadow); font-weight: 600; }
.current-right .meta-line.precip.zero { color: var(--muted); opacity: 0.5; font-weight: 400; }

/* Hourly */
.hourly {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: var(--h-gap);
  padding: 4px 0 12px;
  margin-bottom: 18px;
}

.h-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 7px;
  font-feature-settings: "tnum";
}
.h-time { color: var(--muted); font-size: var(--h-time-size); letter-spacing: 0.3px; }
.h-temp { font-size: var(--h-temp-size); font-weight: 500; }
.h-icon { font-size: var(--h-icon-size); line-height: 1; display: inline-flex; align-items: center; }
.h-wind {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  color: var(--muted);
  font-size: var(--h-wind-text-size);
  font-feature-settings: "tnum";
}
.h-wind .wind-arrow { width: var(--h-arrow-size); height: calc(var(--h-arrow-size) * 0.55); }
.h-precip { color: var(--rain); font-size: var(--h-precip-size); font-feature-settings: "tnum"; font-weight: 600; text-shadow: var(--rain-shadow); }

/* Daily */
.daily { font-size: var(--d-range-size); font-feature-settings: "tnum"; }

.d-row {
  display: grid;
  grid-template-columns: 64px 36px 1fr 92px 56px;
  gap: 16px;
  align-items: center;
  padding: var(--d-row-padding) 0;
  border-bottom: 1px solid var(--line);
}
.d-row:last-child { border-bottom: none; }

.d-day { font-weight: 500; font-size: var(--d-day-size); }
.d-icon { text-align: center; font-size: var(--d-icon-size); line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
.d-range { color: var(--muted); font-size: var(--d-range-size); }
.d-range .high { color: var(--fg); font-weight: 500; }
.d-wind { color: var(--muted); display: inline-flex; align-items: center; gap: 8px; font-size: var(--d-wind-size); }
.d-wind .wind-arrow { width: var(--d-arrow-size); height: calc(var(--d-arrow-size) * 0.55); }
.d-windspeed { font-feature-settings: "tnum"; }
.d-precip { color: var(--rain); text-align: right; font-size: var(--d-precip-size); font-weight: 600; text-shadow: var(--rain-shadow); }

.empty, .err {
  color: var(--muted);
  font-size: 15px;
  text-align: center;
  padding: 60px 0;
}
.err { color: var(--warn); }

.wind-arrow {
  display: inline-block;
  vertical-align: middle;
  flex-shrink: 0;
  filter: drop-shadow(0 1px 1px rgba(0,0,0,0.45));
}

/* Config panel */
.config-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 300px;
  background: rgba(15, 25, 40, 0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 100;
  padding: 14px 16px 20px;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  border-left: 1px solid rgba(255,255,255,0.08);
}
.config-panel.open { transform: translateX(0); }
.config-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.config-header strong { font-size: 13px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--fg); }
.config-close {
  background: rgba(255,255,255,0.1);
  border: none;
  color: var(--fg);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 9px;
  border-radius: 6px;
  line-height: 1;
  font-family: inherit;
}
.config-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.config-actions button {
  flex: 1;
  background: rgba(255,255,255,0.1);
  border: none;
  color: var(--fg);
  font-size: 13px;
  cursor: pointer;
  padding: 8px;
  border-radius: 6px;
  font-family: inherit;
}
.config-panel details { margin: 12px 0; }
.config-panel details summary {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--muted);
  cursor: pointer;
  margin-bottom: 6px;
  user-select: none;
  list-style: none;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.config-panel details summary::-webkit-details-marker { display: none; }
.config-row { margin: 8px 0 10px; }
.config-row label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 4px;
}
.config-row .cv { color: var(--fg); font-weight: 500; font-feature-settings: "tnum"; }
.config-row input[type="range"] {
  width: 100%;
  accent-color: #FFC42D;
}
.source-toggle {
  display: flex;
  gap: 2px;
  background: rgba(255,255,255,0.07);
  border-radius: 8px;
  padding: 3px;
  margin: 6px 0 8px;
}
.source-toggle button {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
  padding: 7px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
}
.source-toggle button.active {
  background: rgba(255,196,45,0.18);
  color: #FFC42D;
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="location-picker" id="locationPicker"></div>
  <div class="header-buttons">
    <button class="icon-btn refresh" id="refresh" title="Refresh" aria-label="Refresh">↻</button>
    <button class="icon-btn config-btn" id="configBtn" title="Configure" aria-label="Configure">⚙</button>
  </div>
</header>

<div id="content">
  <div class="empty">Loading…</div>
</div>

</div>

<aside class="config-panel" id="configPanel">
  <div class="config-header">
    <strong>Display tweaks</strong>
    <button class="config-close" id="configClose" aria-label="Close">×</button>
  </div>
  <details open>
    <summary>Data source</summary>
    <div class="source-toggle" id="sourceToggle">
      <button data-src="noaa">NOAA</button>
      <button data-src="openmeteo">Open-Meteo</button>
    </div>
  </details>
  <div id="configBody"></div>
  <div class="config-actions">
    <button id="configReset">Reset</button>
    <button id="configExport">Export</button>
  </div>
</aside>

<script>
const LOCATIONS = [
  { id: 'local',      name: 'Local',      full: 'Local',           isLocal: true },
  { id: 'louisville', name: 'Louisville', full: 'Louisville, CO',  lat: 39.9778, lon: -105.1319, default: true },
  { id: 'winterpark', name: 'WP',         full: 'Winter Park, CO', lat: 39.8919, lon: -105.7625 },
  { id: 'la',         name: 'LA',         full: 'Los Angeles, CA', lat: 34.0522, lon: -118.2437 },
  { id: 'kc',         name: 'KC',         full: 'Kansas City, MO', lat: 39.0997, lon: -94.5786 },
];

const STATE = {
  active: localStorage.getItem('wx-active') || 'louisville',
  source: localStorage.getItem('wx-source') || 'noaa',
};

// ---------- Config ----------
const CONFIG_DEFS = [
  { group: 'Current', items: [
    { v: '--temp-size',         label: 'Temp size',           min: 50, max: 240, def: 100 },
    { v: '--cond-icon-size',    label: 'Cond. icon size',     min: 24, max: 140, def: 54  },
    { v: '--hilo-size',         label: 'H/L size',            min: 10, max: 40,  def: 18  },
    { v: '--meta-size',         label: 'Wind/Precip size',    min: 12, max: 50,  def: 20  },
  ]},
  { group: 'Hourly', items: [
    { v: '--h-time-size',       label: 'Time size',           min: 10, max: 32, def: 16 },
    { v: '--h-temp-size',       label: 'Temp size',           min: 12, max: 50, def: 22 },
    { v: '--h-icon-size',       label: 'Icon size',           min: 18, max: 80, def: 32 },
    { v: '--h-arrow-size',      label: 'Wind arrow size',     min: 14, max: 60, def: 26 },
    { v: '--h-wind-text-size',  label: 'Wind text size',      min: 10, max: 32, def: 14 },
    { v: '--h-precip-size',     label: 'Rain % size',         min: 10, max: 32, def: 14 },
    { v: '--h-gap',             label: 'Column gap',          min: 0,  max: 24, def: 3  },
  ]},
  { group: 'Daily', items: [
    { v: '--d-day-size',        label: 'Day size',            min: 12, max: 40, def: 18 },
    { v: '--d-icon-size',       label: 'Icon size',           min: 16, max: 64, def: 28 },
    { v: '--d-range-size',      label: 'Hi/Lo size',          min: 12, max: 40, def: 18 },
    { v: '--d-wind-size',       label: 'Wind text size',      min: 10, max: 32, def: 16 },
    { v: '--d-arrow-size',      label: 'Wind arrow size',     min: 12, max: 50, def: 20 },
    { v: '--d-precip-size',     label: 'Rain % size',         min: 10, max: 32, def: 15 },
    { v: '--d-row-padding',     label: 'Row padding',         min: 0,  max: 30, def: 11 },
  ]},
];

function loadConfig() {
  const saved = JSON.parse(localStorage.getItem('wx-config') || '{}');
  for (const g of CONFIG_DEFS) for (const it of g.items) {
    const v = saved[it.v] ?? it.def;
    document.documentElement.style.setProperty(it.v, v + 'px');
  }
}

function saveConfig() {
  const out = {};
  for (const g of CONFIG_DEFS) for (const it of g.items) {
    const cssVal = document.documentElement.style.getPropertyValue(it.v).trim();
    if (cssVal) out[it.v] = parseFloat(cssVal);
  }
  localStorage.setItem('wx-config', JSON.stringify(out));
}

function buildConfigPanel() {
  const body = document.getElementById('configBody');
  body.innerHTML = CONFIG_DEFS.map((g, gi) => `
    <details ${gi < 2 ? 'open' : ''}>
      <summary>${g.group}</summary>
      ${g.items.map(it => {
        const cur = parseFloat(document.documentElement.style.getPropertyValue(it.v)) || it.def;
        return `<div class="config-row">
          <label>${it.label} <span class="cv" data-for="${it.v}">${cur}</span>px</label>
          <input type="range" min="${it.min}" max="${it.max}" value="${cur}" data-var="${it.v}">
        </div>`;
      }).join('')}
    </details>
  `).join('');

  body.addEventListener('input', e => {
    const inp = e.target;
    if (!inp.matches('input[type="range"]')) return;
    const cssVar = inp.dataset.var;
    const v = inp.value;
    document.documentElement.style.setProperty(cssVar, v + 'px');
    const label = body.querySelector(`.cv[data-for="${cssVar}"]`);
    if (label) label.textContent = v;
    saveConfig();
  });

  // Source toggle
  const srcEl = document.getElementById('sourceToggle');
  for (const btn of srcEl.querySelectorAll('button')) {
    btn.classList.toggle('active', btn.dataset.src === STATE.source);
  }
  srcEl.addEventListener('click', e => {
    const btn = e.target.closest('button[data-src]');
    if (!btn) return;
    STATE.source = btn.dataset.src;
    localStorage.setItem('wx-source', STATE.source);
    for (const b of srcEl.querySelectorAll('button')) b.classList.toggle('active', b.dataset.src === STATE.source);
    load();
  });
}

function resetConfig() {
  localStorage.removeItem('wx-config');
  for (const g of CONFIG_DEFS) for (const it of g.items) {
    document.documentElement.style.setProperty(it.v, it.def + 'px');
    const slider = document.querySelector(`.config-panel [data-var="${it.v}"]`);
    if (slider) slider.value = it.def;
    const label = document.querySelector(`.config-panel .cv[data-for="${it.v}"]`);
    if (label) label.textContent = it.def;
  }
}

function exportConfig() {
  const out = JSON.parse(localStorage.getItem('wx-config') || '{}');
  out['wx-source'] = STATE.source;
  const text = JSON.stringify(out, null, 2);
  const btn = document.getElementById('configExport');
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  }).catch(() => {
    alert(text);
  });
}

// ---------- Location coords ----------
const LOCAL_COORDS_TTL_MS = 1000 * 60 * 10;
const POINTS_TTL_MS = 1000 * 60 * 60 * 24 * 30;

async function ensureCoords(loc) {
  if (!loc.isLocal) return { lat: loc.lat, lon: loc.lon };

  const cached = localStorage.getItem('wx-local-coords');
  if (cached) {
    try {
      const c = JSON.parse(cached);
      if (Date.now() - c.ts < LOCAL_COORDS_TTL_MS) return { lat: c.lat, lon: c.lon };
    } catch (e) {}
  }
  if (!navigator.geolocation) throw new Error('Geolocation not supported');
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const data = { lat: pos.coords.latitude, lon: pos.coords.longitude, ts: Date.now() };
        localStorage.setItem('wx-local-coords', JSON.stringify(data));
        resolve({ lat: data.lat, lon: data.lon });
      },
      (err) => reject(new Error(err.message || 'Location request failed')),
      { timeout: 12000, maximumAge: LOCAL_COORDS_TTL_MS, enableHighAccuracy: false }
    );
  });
}

// ---------- NOAA source ----------
async function fetchPoints(loc, coords) {
  const cacheKey = `wx-points-${loc.id}`;
  if (!loc.isLocal) {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      try {
        const parsed = JSON.parse(cached);
        if (parsed.ts && Date.now() - parsed.ts < POINTS_TTL_MS) return parsed.data;
      } catch (e) {}
    }
  }
  const r = await fetch(`https://api.weather.gov/points/${coords.lat},${coords.lon}`);
  if (!r.ok) throw new Error('Points lookup failed (' + r.status + ')');
  const j = await r.json();
  const data = {
    forecast: j.properties.forecast,
    forecastHourly: j.properties.forecastHourly,
    timeZone: j.properties.timeZone,
    city: j.properties.relativeLocation?.properties?.city,
    state: j.properties.relativeLocation?.properties?.state,
  };
  if (!loc.isLocal) localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data }));
  return data;
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('Forecast fetch failed (' + r.status + ')');
  return r.json();
}

async function fetchNOAA(loc, coords) {
  const points = await fetchPoints(loc, coords);
  const [daily, hourly] = await Promise.all([
    fetchJSON(points.forecast),
    fetchJSON(points.forecastHourly),
  ]);
  return { daily, hourly, city: points.city, state: points.state };
}

// ---------- Open-Meteo source ----------
function wmoToShortForecast(code, isDay) {
  if (code === 0) return isDay ? 'Sunny' : 'Clear';
  if (code === 1) return isDay ? 'Mostly Sunny' : 'Mostly Clear';
  if (code === 2) return 'Partly Cloudy';
  if (code === 3) return 'Cloudy';
  if (code === 45 || code === 48) return 'Fog';
  if (code === 51 || code === 53 || code === 55) return 'Drizzle';
  if (code === 56 || code === 57) return 'Freezing Drizzle';
  if (code === 61) return 'Light Rain';
  if (code === 63) return 'Rain';
  if (code === 65) return 'Heavy Rain';
  if (code === 66 || code === 67) return 'Freezing Rain';
  if (code === 71 || code === 73) return 'Snow';
  if (code === 75) return 'Heavy Snow';
  if (code === 77) return 'Snow';
  if (code === 80 || code === 81) return 'Rain Showers';
  if (code === 82) return 'Heavy Rain Showers';
  if (code === 85 || code === 86) return 'Snow Showers';
  if (code === 95) return 'Thunderstorms';
  if (code === 96 || code === 99) return 'Thunderstorms';
  return 'Unknown';
}

function degreesToCompass(deg) {
  if (deg == null) return null;
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const idx = Math.round((((deg % 360) + 360) % 360) / 22.5) % 16;
  return dirs[idx];
}

async function fetchOpenMeteo(loc, coords) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}` +
    `&hourly=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,precipitation_probability,is_day` +
    `&daily=temperature_2m_max,temperature_2m_min,weather_code,wind_speed_10m_max,wind_direction_10m_dominant,precipitation_probability_max` +
    `&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto&forecast_days=8` +
    `&models=ecmwf_ifs025`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Open-Meteo fetch failed (' + r.status + ')');
  const j = await r.json();

  const hourlyPeriods = j.hourly.time.map((t, i) => {
    const next = j.hourly.time[i + 1];
    return {
      startTime: t,
      endTime: next || t,
      temperature: Math.round(j.hourly.temperature_2m[i]),
      windSpeed: `${Math.round(j.hourly.wind_speed_10m[i])} mph`,
      windDirection: degreesToCompass(j.hourly.wind_direction_10m[i]),
      shortForecast: wmoToShortForecast(j.hourly.weather_code[i], j.hourly.is_day[i] === 1),
      probabilityOfPrecipitation: { value: j.hourly.precipitation_probability[i] ?? 0 },
      isDaytime: j.hourly.is_day[i] === 1,
    };
  });

  const dailyPeriods = [];
  for (let i = 0; i < j.daily.time.length; i++) {
    const dateStr = j.daily.time[i];
    const code = j.daily.weather_code[i];
    const wspeed = `${Math.round(j.daily.wind_speed_10m_max[i])} mph`;
    const wdir = degreesToCompass(j.daily.wind_direction_10m_dominant[i]);
    const pop = j.daily.precipitation_probability_max[i] ?? 0;
    dailyPeriods.push({
      startTime: dateStr + 'T07:00:00',
      isDaytime: true,
      temperature: Math.round(j.daily.temperature_2m_max[i]),
      windSpeed: wspeed,
      windDirection: wdir,
      shortForecast: wmoToShortForecast(code, true),
      probabilityOfPrecipitation: { value: pop },
    });
    dailyPeriods.push({
      startTime: dateStr + 'T19:00:00',
      isDaytime: false,
      temperature: Math.round(j.daily.temperature_2m_min[i]),
      windSpeed: wspeed,
      windDirection: wdir,
      shortForecast: wmoToShortForecast(code, false),
      probabilityOfPrecipitation: { value: pop },
    });
  }

  return {
    daily: { properties: { periods: dailyPeriods } },
    hourly: { properties: { periods: hourlyPeriods } },
    city: null,
    state: null,
  };
}

// ---------- Icons / classification ----------
function iconFor(shortForecast, isDay, precipPct) {
  const s = (shortForecast || '').toLowerCase();
  const chance = s.includes('chance');
  const expected = precipPct != null && precipPct >= 30;

  // Below 30% precip: no rain-related icon, even if NWS text mentions "chance" of rain/snow/thunder.
  if (s.includes('thunder')) {
    if (expected) return '⛈️';
    return chance ? (isDay ? '⛅' : '☁️') : '⛈️';
  }
  if (s.includes('snow') && s.includes('rain')) return '🌨️';
  if (s.includes('snow') || s.includes('flurr')) {
    if (expected) return '❄️';
    return chance ? (isDay ? '⛅' : '☁️') : '❄️';
  }
  if (s.includes('sleet') || s.includes('ice') || s.includes('freezing')) return '🌧️';
  if (s.includes('rain') || s.includes('shower') || s.includes('drizzle')) {
    if (expected) return '🌧️';
    return chance ? (isDay ? '⛅' : '☁️') : '🌧️';
  }
  if (s.includes('fog') || s.includes('mist') || s.includes('haze') || s.includes('smoke')) return '🌫️';
  if (s.includes('partly')) return isDay ? '⛅' : '☁️';
  if (s.includes('mostly cloudy')) return '☁️';
  if (s.includes('cloudy') || s.includes('overcast')) return '☁️';
  if (s.includes('mostly sunny') || s.includes('mostly clear')) return isDay ? '🌤️' : '🌙';
  if (s.includes('sunny') || s.includes('clear') || s.includes('fair')) return isDay ? '☀️' : '🌙';
  if (s.includes('wind')) return '💨';
  if (s.includes('hot')) return '🌡️';
  return '·';
}

function classifyCondition(shortForecast, isDay, precipPct) {
  const s = (shortForecast || '').toLowerCase();
  const chance = s.includes('chance');
  const expected = precipPct != null && precipPct >= 30;

  if (s.includes('thunder')) {
    if (expected) return 'thunderstorm';
    return chance ? (isDay ? 'partly-cloudy-day' : 'partly-cloudy-night') : 'thunderstorm';
  }
  if (s.includes('snow') || s.includes('flurr') || s.includes('sleet') || s.includes('ice')) {
    if (expected) return 'snow';
    return chance ? (isDay ? 'partly-cloudy-day' : 'partly-cloudy-night') : 'snow';
  }
  if (s.includes('rain') || s.includes('shower') || s.includes('drizzle')) {
    if (expected) return 'rain';
    return chance ? (isDay ? 'partly-cloudy-day' : 'partly-cloudy-night') : 'rain';
  }
  if (s.includes('fog') || s.includes('mist') || s.includes('haze') || s.includes('smoke')) return 'fog';
  if (s.includes('partly')) return isDay ? 'partly-cloudy-day' : 'partly-cloudy-night';
  if (s.includes('cloudy') || s.includes('overcast') || s.includes('mostly cloudy')) return isDay ? 'cloudy-day' : 'cloudy-night';
  if (s.includes('mostly sunny')) return 'partly-cloudy-day';
  if (s.includes('mostly clear')) return 'partly-cloudy-night';
  return isDay ? 'clear-day' : 'clear-night';
}

const CONDITION_GRADIENT = {
  'clear-day':           'linear-gradient(180deg, #2d6cb6 0%, #5fa8e0 45%, #f0bb6e 100%)',
  'clear-night':         'linear-gradient(180deg, #06101e 0%, #14253f 50%, #243a5c 100%)',
  'partly-cloudy-day':   'linear-gradient(180deg, #3d6e9c 0%, #6e9bbe 50%, #a4bcd3 100%)',
  'partly-cloudy-night': 'linear-gradient(180deg, #0e1a2c 0%, #29405e 100%)',
  'cloudy-day':          'linear-gradient(180deg, #4f5c6e 0%, #6f7d92 60%, #8c97a8 100%)',
  'cloudy-night':        'linear-gradient(180deg, #1a2030 0%, #353e51 100%)',
  'rain':                'linear-gradient(180deg, #2c3e50 0%, #46637c 50%, #2c4a64 100%)',
  'thunderstorm':        'linear-gradient(180deg, #14182a 0%, #2c3148 50%, #423a55 100%)',
  'snow':                'linear-gradient(180deg, #4d647a 0%, #7d92a6 60%, #a8b8c6 100%)',
  'fog':                 'linear-gradient(180deg, #4a5563 0%, #6c7886 60%, #8a96a4 100%)',
};

const CONDITION_IMAGE = {
  'clear-day':           'https://source.unsplash.com/1200x900/?clear-sky,blue-sky',
  'clear-night':         'https://source.unsplash.com/1200x900/?starry-night,stars',
  'partly-cloudy-day':   'https://source.unsplash.com/1200x900/?sky,clouds',
  'partly-cloudy-night': 'https://source.unsplash.com/1200x900/?night-clouds',
  'cloudy-day':          'https://source.unsplash.com/1200x900/?overcast,clouds',
  'cloudy-night':        'https://source.unsplash.com/1200x900/?night-overcast',
  'rain':                'https://source.unsplash.com/1200x900/?rain',
  'thunderstorm':        'https://source.unsplash.com/1200x900/?thunderstorm,lightning',
  'snow':                'https://source.unsplash.com/1200x900/?snow,winter',
  'fog':                 'https://source.unsplash.com/1200x900/?fog,mist',
};

function applyBackground(condition) {
  const grad = CONDITION_GRADIENT[condition] || CONDITION_GRADIENT['cloudy-day'];
  document.body.style.backgroundImage = grad;
  const imgUrl = CONDITION_IMAGE[condition];
  if (!imgUrl) return;
  const test = new Image();
  test.onload = () => {
    document.body.style.backgroundImage =
      `linear-gradient(180deg, rgba(0,0,0,0.20) 0%, rgba(0,0,0,0.55) 100%), url("${imgUrl}")`;
  };
  test.onerror = () => {};
  test.src = imgUrl;
}

function parseWindSpeed(s) {
  if (!s) return null;
  const m = s.match(/(\d+)(?:\s*to\s*(\d+))?/);
  if (!m) return null;
  return m[2] ? Math.round((+m[1] + +m[2]) / 2) : +m[1];
}

const COMPASS_DEG = {
  N:0, NNE:22.5, NE:45, ENE:67.5, E:90, ESE:112.5, SE:135, SSE:157.5,
  S:180, SSW:202.5, SW:225, WSW:247.5, W:270, WNW:292.5, NW:315, NNW:337.5
};

function windStroke(speed) {
  if (speed == null || speed < 8) return 1.0;
  if (speed < 16) return 2.6;
  return 4.0;
}

function windArrow(direction, speed) {
  if (!direction) return '';
  const deg = COMPASS_DEG[direction.toUpperCase()];
  if (deg === undefined) return '';
  const rot = (deg + 90) % 360;
  const sw = windStroke(speed);
  return `<svg class="wind-arrow" viewBox="0 0 20 12" style="transform: rotate(${rot}deg);" preserveAspectRatio="xMidYMid meet">
    <path d="M3 6 H14 M11 3 L14 6 L11 9" stroke="currentColor" stroke-width="${sw}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function formatHour(iso) {
  const d = new Date(iso);
  const h = d.getHours();
  if (h === 0) return '12a';
  if (h < 12) return h + 'a';
  if (h === 12) return '12p';
  return (h - 12) + 'p';
}

function formatDay(iso) {
  return new Date(iso).toLocaleDateString('en-US', { weekday: 'short' });
}

function findHighLow(periods) {
  let high = null, low = null;
  for (const p of periods) {
    if (p.isDaytime && high === null) high = p.temperature;
    else if (!p.isDaytime && low === null) low = p.temperature;
    if (high !== null && low !== null) break;
  }
  return { high, low };
}

function pairDaily(periods) {
  const out = [];
  let i = 0;
  while (i < periods.length && out.length < 8) {
    const a = periods[i];
    const b = periods[i + 1];
    if (a && a.isDaytime && b && !b.isDaytime) {
      out.push({
        date: a.startTime,
        high: a.temperature,
        low: b.temperature,
        shortForecast: a.shortForecast,
        windSpeed: parseWindSpeed(a.windSpeed),
        windDirection: a.windDirection,
        precip: Math.max(a.probabilityOfPrecipitation?.value ?? 0, b.probabilityOfPrecipitation?.value ?? 0),
      });
      i += 2;
    } else if (a && !a.isDaytime) {
      out.push({
        date: a.startTime,
        high: null,
        low: a.temperature,
        shortForecast: a.shortForecast,
        windSpeed: parseWindSpeed(a.windSpeed),
        windDirection: a.windDirection,
        precip: a.probabilityOfPrecipitation?.value ?? 0,
        nightOnly: true,
      });
      i += 1;
    } else {
      i += 1;
    }
  }
  return out;
}

// ---------- Render ----------
function renderLocationPicker() {
  const picker = document.getElementById('locationPicker');
  picker.innerHTML = LOCATIONS.map(l =>
    `<button data-id="${l.id}" class="${l.id === STATE.active ? 'active' : ''}">${l.name}</button>`
  ).join('');
}

function renderError(msg) {
  document.getElementById('content').innerHTML = `<div class="err">${msg}</div>`;
}

function renderWeather(daily, hourly, meta) {
  const loc = LOCATIONS.find(l => l.id === STATE.active);

  // Filter out past hourly periods (stale generation from NWS).
  const nowMs = Date.now();
  const validHourly = hourly.properties.periods.filter(p =>
    new Date(p.endTime || p.startTime).getTime() > nowMs
  );
  const cur = validHourly[0] || hourly.properties.periods[0];
  // Hourly strip: skip the current hour, show next 6 starting at the upcoming hour boundary.
  const upcoming = validHourly.slice(1, 7);

  const speed = parseWindSpeed(cur.windSpeed);
  const dir = cur.windDirection;
  const precip = cur.probabilityOfPrecipitation?.value ?? 0;

  const condition = classifyCondition(cur.shortForecast, cur.isDaytime, precip);
  applyBackground(condition);

  const dailyPairs = pairDaily(daily.properties.periods);
  const upcomingDays = dailyPairs.slice(1, 7);
  const { high, low } = findHighLow(daily.properties.periods);

  let html = '';

  if (loc.isLocal) {
    const label = (meta?.city && meta?.state) ? `Local · ${meta.city}, ${meta.state}` : 'Local';
    html += `<div class="location-label">${label}</div>`;
  } else if (!loc.default) {
    html += `<div class="location-label">${loc.full}</div>`;
  }

  html += `<section class="current">
    <div class="current-grid">
      <div class="current-left">
        <div class="temp-line">
          <span class="temp">${Math.round(cur.temperature)}°</span>
          <span class="cond-icon">${iconFor(cur.shortForecast, cur.isDaytime, precip)}</span>
        </div>
        ${high != null && low != null ? `<div class="hilo"><span class="hi">${high}°</span> / ${low}°</div>` : ''}
      </div>
      <div class="current-right">
        <div class="meta-line">${windArrow(dir, speed)} ${speed ?? '–'} mph</div>
        <div class="meta-line precip ${precip === 0 ? 'zero' : ''}">☔ ${precip}%</div>
      </div>
    </div>
  </section>`;

  html += `<div class="hourly">`;
  for (const h of upcoming) {
    const sp = parseWindSpeed(h.windSpeed);
    const pp = h.probabilityOfPrecipitation?.value ?? 0;
    html += `
      <div class="h-col">
        <div class="h-time">${formatHour(h.startTime)}</div>
        <div class="h-temp">${Math.round(h.temperature)}°</div>
        <div class="h-icon">${iconFor(h.shortForecast, h.isDaytime, pp)}</div>
        <div class="h-wind">${windArrow(h.windDirection, sp)} <span class="h-windspeed">${sp ?? '–'}</span></div>
        <div class="h-precip">${pp}%</div>
      </div>
    `;
  }
  html += `</div>`;

  html += `<div class="daily">`;
  upcomingDays.forEach((p) => {
    const dHigh = p.high != null ? `<span class="high">${p.high}°</span>` : '<span class="high">—</span>';
    const dLow = p.low != null ? `${p.low}°` : '—';
    html += `
      <div class="d-row">
        <span class="d-day">${formatDay(p.date)}</span>
        <span class="d-icon">${iconFor(p.shortForecast, true, p.precip)}</span>
        <span class="d-range">${dHigh} / ${dLow}</span>
        <span class="d-wind">${windArrow(p.windDirection, p.windSpeed)}<span class="d-windspeed">${p.windSpeed ?? '–'}</span></span>
        <span class="d-precip">${p.precip}%</span>
      </div>
    `;
  });
  html += `</div>`;

  document.getElementById('content').innerHTML = html;
}

// ---------- Load ----------
let loading = false;
async function load() {
  if (loading) return;
  loading = true;
  const refreshBtn = document.getElementById('refresh');
  refreshBtn.classList.add('spinning');

  let loc = LOCATIONS.find(l => l.id === STATE.active);
  if (!loc) {
    loc = LOCATIONS.find(l => l.default);
    STATE.active = loc.id;
    localStorage.setItem('wx-active', STATE.active);
    renderLocationPicker();
  }

  try {
    const coords = await ensureCoords(loc);
    const data = STATE.source === 'openmeteo'
      ? await fetchOpenMeteo(loc, coords)
      : await fetchNOAA(loc, coords);
    renderWeather(data.daily, data.hourly, { city: data.city, state: data.state });
    localStorage.setItem('wx-last-load', Date.now().toString());
  } catch (e) {
    console.error(e);
    if (loc.isLocal) {
      const def = LOCATIONS.find(l => l.default);
      STATE.active = def.id;
      localStorage.setItem('wx-active', STATE.active);
      renderLocationPicker();
      refreshBtn.classList.remove('spinning');
      loading = false;
      return load();
    }
    renderError('Could not load weather. ' + e.message);
  } finally {
    refreshBtn.classList.remove('spinning');
    loading = false;
  }
}

// ---------- Init ----------
loadConfig();
buildConfigPanel();
renderLocationPicker();
load();

document.getElementById('locationPicker').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  if (btn.dataset.id === STATE.active) return;
  STATE.active = btn.dataset.id;
  localStorage.setItem('wx-active', STATE.active);
  renderLocationPicker();
  load();
});

document.getElementById('refresh').addEventListener('click', load);
document.getElementById('configBtn').addEventListener('click', () => {
  document.getElementById('configPanel').classList.toggle('open');
});
document.getElementById('configClose').addEventListener('click', () => {
  document.getElementById('configPanel').classList.remove('open');
});
document.getElementById('configReset').addEventListener('click', resetConfig);
document.getElementById('configExport').addEventListener('click', exportConfig);

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    const last = +localStorage.getItem('wx-last-load') || 0;
    if (Date.now() - last > 1000 * 60 * 10) load();
  }
});

// Keep data fresh for long-open tabs.
setInterval(() => {
  const last = +localStorage.getItem('wx-last-load') || 0;
  if (Date.now() - last > 1000 * 60 * 15) load();
}, 1000 * 60);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch((e) => console.warn('SW register failed', e));
  });
}
</script>
