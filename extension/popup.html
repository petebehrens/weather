<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weather</title>
<style>
:root {
  --fg: rgba(255,255,255,0.96);
  --muted: rgba(255,255,255,0.65);
  --line: rgba(255,255,255,0.16);
  --chip: rgba(255,255,255,0.14);
  --chip-active: rgba(255,255,255,0.92);
  --chip-active-fg: #0a1929;
  --rain: #BFE0FF;
  --warn: #fca5a5;
  --shadow: 0 1px 3px rgba(0,0,0,0.45);
  --rain-shadow: 0 1px 3px rgba(0,0,0,0.7);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { width: 420px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  color: var(--fg);
  text-shadow: var(--shadow);
  width: 420px;
  min-height: 600px;
  position: relative;
  background: linear-gradient(180deg, #1a2a3e 0%, #2d4a6e 100%);
  background-size: cover;
  background-position: center;
}

body::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.40) 100%);
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative;
  z-index: 1;
  padding: 14px 18px 18px;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  gap: 6px;
}

.location-picker {
  display: flex;
  gap: 2px;
  background: var(--chip);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: 999px;
  padding: 3px;
  flex: 0 1 auto;
}

.location-picker button {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
  padding: 5px 10px;
  border-radius: 999px;
  cursor: pointer;
  font-family: inherit;
  text-shadow: var(--shadow);
  white-space: nowrap;
}

.location-picker button.active {
  background: var(--chip-active);
  color: var(--chip-active-fg);
  text-shadow: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.18);
}

.refresh {
  background: transparent;
  border: none;
  color: var(--fg);
  font-size: 16px;
  cursor: pointer;
  font-family: inherit;
  padding: 4px 8px;
  line-height: 1;
  opacity: 0.75;
  flex-shrink: 0;
}
.refresh:hover { opacity: 1; }
.refresh.spinning { animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.location-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.4px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.current { margin-bottom: 18px; }

.current-grid {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.current-left { min-width: 0; display: inline-flex; flex-direction: column; align-items: center; }
.temp-line { display: flex; align-items: center; gap: 12px; }

.current .temp {
  font-size: 80px;
  font-weight: 200;
  letter-spacing: -3px;
  line-height: 0.95;
  font-feature-settings: "tnum";
}

.current .cond-icon {
  font-size: 44px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
}

.current .hilo {
  font-size: 16px;
  color: var(--muted);
  margin-top: 8px;
  font-feature-settings: "tnum";
  text-align: center;
  width: 100%;
}
.current .hilo .hi { color: var(--fg); font-weight: 500; }

.current-right {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
  text-align: right;
}

.current-right .meta-line {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 17px;
  font-feature-settings: "tnum";
  font-weight: 500;
}

.current-right .meta-line.precip { color: var(--rain); text-shadow: var(--rain-shadow); font-weight: 600; }
.current-right .meta-line.precip.zero { color: var(--muted); opacity: 0.5; font-weight: 400; }

/* Hourly — 6, no box, tight gap */
.hourly {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 2px;
  padding: 4px 0 8px;
  margin-bottom: 12px;
}

.h-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-feature-settings: "tnum";
}
.h-time { color: var(--muted); font-size: 15px; letter-spacing: 0.3px; }
.h-temp { font-size: 18px; font-weight: 500; }
.h-icon { font-size: 26px; line-height: 1; display: inline-flex; align-items: center; }
.h-wind {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  color: var(--muted);
  font-size: 13px;
  font-feature-settings: "tnum";
}
.h-wind .wind-arrow { width: 24px; height: 13px; }
.h-windspeed { font-feature-settings: "tnum"; }
.h-precip { color: var(--rain); font-size: 13px; font-feature-settings: "tnum"; font-weight: 600; text-shadow: var(--rain-shadow); }

/* Daily — 6 days, taller */
.daily { font-size: 16px; font-feature-settings: "tnum"; }
.d-row {
  display: grid;
  grid-template-columns: 56px 30px 1fr 80px 50px;
  gap: 12px;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--line);
}
.d-row:last-child { border-bottom: none; }
.d-day { font-weight: 500; font-size: 16px; }
.d-icon { text-align: center; font-size: 24px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
.d-range { color: var(--muted); font-size: 16px; }
.d-range .high { color: var(--fg); font-weight: 500; }
.d-wind { color: var(--muted); display: inline-flex; align-items: center; gap: 7px; font-size: 14px; }
.d-wind .wind-arrow { width: 20px; height: 11px; }
.d-windspeed { font-feature-settings: "tnum"; }
.d-precip { color: var(--rain); text-align: right; font-size: 13px; font-weight: 600; text-shadow: var(--rain-shadow); }

.empty, .err {
  color: var(--muted);
  font-size: 13px;
  text-align: center;
  padding: 50px 0;
}
.err { color: var(--warn); }

.wind-arrow {
  display: inline-block;
  vertical-align: middle;
  flex-shrink: 0;
  filter: drop-shadow(0 1px 1px rgba(0,0,0,0.45));
}

.wx-icon { display: inline-block; vertical-align: -0.18em; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="location-picker" id="locationPicker"></div>
  <button class="refresh" id="refresh" title="Refresh" aria-label="Refresh">↻</button>
</header>

<div id="content">
  <div class="empty">Loading…</div>
</div>

</div>
<script src="popup.js"></script>
</body>
</html>
